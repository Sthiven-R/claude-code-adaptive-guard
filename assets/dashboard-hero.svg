<!--
  Provisional dashboard hero for the README.

  This is a MOCK — a hand-drawn SVG that approximates the real
  dashboard layout and tokens (cyan accent, neutral-950 canvas,
  6-card stat grid, decision cards). It is intentionally less
  detailed than the real app so nobody mistakes it for an actual
  screenshot.

  Replace with a real screenshot the first time the operator
  builds the desktop bundle and runs it with telemetry loaded:

    1. cd dashboard && npm run tauri dev
    2. Capture the window at 1600x900 (Snipping Tool / Shottr / Flameshot)
    3. Save as assets/dashboard-real.png
    4. Update README.md to point at the real screenshot

  Keep this mock around as a fallback for when the README is
  rendered in environments where PNG embeds are stripped.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <!-- Window canvas -->
  <rect width="1280" height="720" rx="12" fill="#09090b" />

  <!-- Window chrome bar (Tauri title bar mock) -->
  <rect x="0" y="0" width="1280" height="32" fill="#0e0e10" />
  <circle cx="20" cy="16" r="6" fill="#27272a" />
  <circle cx="40" cy="16" r="6" fill="#27272a" />
  <circle cx="60" cy="16" r="6" fill="#27272a" />
  <text x="640" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#52525b">Adaptive Guard</text>

  <!-- Stats header card -->
  <g transform="translate(60, 80)">
    <rect width="1160" height="200" rx="12" fill="#18181b" stroke="#27272a" />

    <!-- Brand top-left -->
    <g transform="translate(24, 28)">
      <!-- Logo mark @1.4x -->
      <g transform="scale(1.4)">
        <path d="M 25.53 11.5 A 11 11 0 1 0 21.5 25.53" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" />
        <path d="M 7 17 L 11.5 17 L 13.5 13 L 17 21 L 19 17 L 25 17" stroke="#22d3ee" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
      </g>
      <text x="60" y="32" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#fafafa">adaptive<tspan fill="#22d3ee" font-weight="700">·</tspan>guard</text>
    </g>

    <!-- Meta top-right -->
    <text x="1136" y="42" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#a1a1aa">profile: <tspan fill="#fafafa" font-weight="600">balanced</tspan>     v0.1.0</text>

    <!-- Six metric cards -->
    <g transform="translate(24, 100)" font-family="JetBrains Mono, monospace">
      <!-- Total -->
      <line x1="0" y1="6" x2="0" y2="64" stroke="#27272a" stroke-width="2" />
      <text x="14" y="14" font-size="10" fill="#71717a" letter-spacing="1">TOTAL</text>
      <text x="14" y="42" font-size="22" font-weight="600" fill="#fafafa">288</text>

      <!-- Blocks -->
      <g transform="translate(180, 0)">
        <line x1="0" y1="6" x2="0" y2="64" stroke="#f87171" stroke-width="2" />
        <text x="14" y="14" font-size="10" fill="#71717a" letter-spacing="1">BLOCKS</text>
        <text x="14" y="42" font-size="22" font-weight="600" fill="#fafafa">36</text>
        <text x="14" y="60" font-size="11" fill="#71717a">12.5%</text>
      </g>

      <!-- Deep -->
      <g transform="translate(360, 0)">
        <line x1="0" y1="6" x2="0" y2="64" stroke="#4ade80" stroke-width="2" />
        <text x="14" y="14" font-size="10" fill="#71717a" letter-spacing="1">DEEP ALLOWED</text>
        <text x="14" y="42" font-size="22" font-weight="600" fill="#fafafa">94</text>
        <text x="14" y="60" font-size="11" fill="#71717a">32.6%</text>
      </g>

      <!-- Simple -->
      <g transform="translate(540, 0)">
        <line x1="0" y1="6" x2="0" y2="64" stroke="#52525b" stroke-width="2" />
        <text x="14" y="14" font-size="10" fill="#71717a" letter-spacing="1">SIMPLE</text>
        <text x="14" y="42" font-size="22" font-weight="600" fill="#fafafa">158</text>
        <text x="14" y="60" font-size="11" fill="#71717a">54.9%</text>
      </g>

      <!-- Tokens -->
      <g transform="translate(720, 0)">
        <line x1="0" y1="6" x2="0" y2="64" stroke="#22d3ee" stroke-width="2" />
        <text x="14" y="14" font-size="10" fill="#71717a" letter-spacing="1">TOKENS IN/OUT</text>
        <text x="14" y="42" font-size="22" font-weight="600" fill="#fafafa">42K <tspan fill="#71717a">/</tspan> 187K</text>
        <text x="14" y="60" font-size="11" fill="#71717a">chars/4 estimate</text>
      </g>

      <!-- Since -->
      <g transform="translate(940, 0)">
        <line x1="0" y1="6" x2="0" y2="64" stroke="#155e75" stroke-width="2" />
        <text x="14" y="14" font-size="10" fill="#71717a" letter-spacing="1">SINCE</text>
        <text x="14" y="42" font-size="14" font-weight="600" fill="#fafafa">12 days ago</text>
        <text x="14" y="60" font-size="11" fill="#71717a">last: 2m ago</text>
      </g>
    </g>
  </g>

  <!-- Two histograms -->
  <g transform="translate(60, 304)">
    <rect width="572" height="160" rx="10" fill="#18181b" stroke="#27272a" />
    <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#a1a1aa" letter-spacing="1">COMPLEXITY DISTRIBUTION</text>
    <!-- bars -->
    <g transform="translate(20, 50)">
      <rect x="0"   y="60" width="42" height="20" fill="#27272a" />
      <rect x="50"  y="40" width="42" height="40" fill="#27272a" />
      <rect x="100" y="20" width="42" height="60" fill="#52525b" />
      <rect x="150" y="10" width="42" height="70" fill="#52525b" />
      <rect x="200" y="30" width="42" height="50" fill="#22d3ee" />
      <rect x="250" y="50" width="42" height="30" fill="#22d3ee" />
      <rect x="300" y="65" width="42" height="15" fill="#22d3ee" />
      <rect x="350" y="70" width="42" height="10" fill="#22d3ee" />
      <rect x="400" y="45" width="42" height="35" fill="#f87171" />
      <rect x="450" y="55" width="42" height="25" fill="#f87171" />
      <rect x="500" y="68" width="42" height="12" fill="#f87171" />
    </g>
  </g>
  <g transform="translate(648, 304)">
    <rect width="572" height="160" rx="10" fill="#18181b" stroke="#27272a" />
    <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#a1a1aa" letter-spacing="1">DEPTH DISTRIBUTION</text>
    <g transform="translate(20, 50)">
      <rect x="0"   y="68" width="42" height="12" fill="#27272a" />
      <rect x="50"  y="55" width="42" height="25" fill="#27272a" />
      <rect x="100" y="40" width="42" height="40" fill="#52525b" />
      <rect x="150" y="20" width="42" height="60" fill="#52525b" />
      <rect x="200" y="10" width="42" height="70" fill="#22d3ee" />
      <rect x="250" y="30" width="42" height="50" fill="#22d3ee" />
      <rect x="300" y="50" width="42" height="30" fill="#22d3ee" />
      <rect x="350" y="35" width="42" height="45" fill="#4ade80" />
      <rect x="400" y="20" width="42" height="60" fill="#4ade80" />
      <rect x="450" y="40" width="42" height="40" fill="#4ade80" />
      <rect x="500" y="60" width="42" height="20" fill="#4ade80" />
    </g>
  </g>

  <!-- Decision cards (3) -->
  <g transform="translate(60, 488)" font-family="JetBrains Mono, monospace">
    <text x="0" y="0" font-size="11" fill="#a1a1aa" letter-spacing="1">RECENT DECISIONS</text>

    <!-- Card 1: BLOCK -->
    <g transform="translate(0, 16)">
      <rect width="1160" height="56" rx="8" fill="#18181b" stroke="#27272a" />
      <rect width="3" height="56" fill="#f87171" />
      <rect x="20" y="18" width="60" height="20" rx="4" fill="#3a1313" stroke="#5b1f1f" />
      <text x="50" y="32" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171" letter-spacing="1">BLOCK</text>
      <text x="100" y="26" font-size="13" fill="#fafafa">Today 14:32</text>
      <text x="100" y="42" font-size="11" fill="#71717a">2m ago</text>
      <text x="320" y="34" font-size="13" fill="#fafafa">c <tspan font-weight="600">62</tspan>     d <tspan font-weight="600">28</tspan></text>
      <text x="1140" y="34" text-anchor="end" font-size="11" fill="#71717a">2 missing aspects</text>
    </g>

    <!-- Card 2: DEEP -->
    <g transform="translate(0, 80)">
      <rect width="1160" height="56" rx="8" fill="#18181b" stroke="#27272a" />
      <rect width="3" height="56" fill="#4ade80" />
      <rect x="20" y="18" width="60" height="20" rx="4" fill="#0f2a18" stroke="#1f4c2c" />
      <text x="50" y="32" text-anchor="middle" font-size="10" font-weight="600" fill="#4ade80" letter-spacing="1">DEEP</text>
      <text x="100" y="26" font-size="13" fill="#fafafa">Today 14:28</text>
      <text x="100" y="42" font-size="11" fill="#71717a">6m ago</text>
      <text x="320" y="34" font-size="13" fill="#fafafa">c <tspan font-weight="600">71</tspan>     d <tspan font-weight="600">68</tspan></text>
    </g>

    <!-- Card 3: SKIP -->
    <g transform="translate(0, 144)">
      <rect width="1160" height="56" rx="8" fill="#18181b" stroke="#27272a" />
      <rect width="3" height="56" fill="#27272a" />
      <text x="20" y="34" font-size="10" font-weight="600" fill="#71717a" letter-spacing="1">SKIP</text>
      <text x="100" y="26" font-size="13" fill="#fafafa">Today 14:21</text>
      <text x="100" y="42" font-size="11" fill="#71717a">13m ago</text>
      <text x="320" y="34" font-size="13" fill="#fafafa">c <tspan font-weight="600">22</tspan>     d <tspan fill="#71717a">—</tspan></text>
    </g>
  </g>
</svg>
